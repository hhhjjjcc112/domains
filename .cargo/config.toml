[alias]
domain = "run -p domain --"

[target.riscv64]
# --cfg getrandom_backend="linux_getrandom"
rustflags = [
    "-Clink-arg=-pie",
    "-A", "unused_imports",
    "--cfg", "getrandom_backend=\"custom\""
]
# 域镜像不依赖 libc，统一使用 lld 以减少宿主机工具链耦合。
linker = "rust-lld"

[target.x86_64]
rustflags = [
    "-Clink-arg=-pie",
    "-A", "unused_imports",
    "--cfg", "getrandom_backend=\"custom\""
]
# 域镜像不依赖 libc，统一使用 lld 以减少宿主机工具链耦合。
linker = "rust-lld"

[profile.release]
lto = true
strip = true
opt-level = 3
